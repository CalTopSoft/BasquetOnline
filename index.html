<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Baloncesto Multijugador - Modo Online</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.22.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        .gameplay {
            width: 750px;
            height: 550px;
            position: relative;
            overflow: hidden;
            background: url('img/fondo/background.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            position: relative;
            width: 600px;
            height: 400px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        input {
            padding: 10px;
            font-size: 16px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .score {
            position: absolute;
            top: 380px;
            left: 220px;
            font-size: 20px;
            color: rgb(0, 16, 243);
            text-shadow: 1px 1px 2px black;
        }
        .turn {
            position: absolute;
            top: -65px;
            right: -170px;
            font-size: 16px;
            color: #fff;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            text-shadow: 2px 2px 4px #000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            font-weight: bold;
            letter-spacing: 1px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .turn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
        }
        .round {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        .timer {
            position: absolute;
            top: 20px;
            right: 15px;
            font-size: 20px;
            color: white;
            text-shadow: 1px 1px 2px black;
            width: 120px;
            height: 10px;
            background-color: #f00;
            border-radius: 5px;
        }
        .timer-bar {
            height: 100%;
            background-color: #0f0;
            transition: width 1s linear;
            border-radius: 5px;
        }
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: white;
            text-shadow: 2px 2px 4px black;
        }
        .player-icon {
            position: absolute;
            top: -65px;
            width: 60px;
            height: 60px;
        }
        .player1 { left: calc(50% - 150px); }
        .player2 { left: calc(50% + 100px); }
        .player-name {
            position: absolute;
            top: -5px;
            font-size: 20px;
            color: rgb(219, 0, 172);
            text-shadow: 1px 1px 2px black;
        }
        .player1-name { left: calc(50% - 165px); }
        .player2-name { left: calc(50% + 85px); }
        .turn-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: yellow;
            text-shadow: 1px 1px 2px black;
        }
        .room {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .height-limit {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 0, 0.3);
            border-bottom: 2px dashed rgba(255, 255, 0, 0.6);
        }
        .waiting-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px black;
        }
        .attempts {
            position: absolute;
            top: 40px;
            left: 20px;
            font-size: 16px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useReducer, memo } = React;

        const SoundManager = (() => {
            let backgroundSound = null;
            let bounceSound = null;
            let hoopHitSound = null;
            let wheelsSound = null;
            let scoreSound = null;
            let scoreAddSound = null;
            let winSound = null;
            let loseSound = null;
            let isSoundPlaying = false;

            const init = () => {
                console.log("DEBUG: Initializing SoundManager");
                try {
                    backgroundSound = new Audio('sound/background.mp3');
                    backgroundSound.loop = true;
                    backgroundSound.volume = 0.5; // Aumentado para ser más audible
                    console.log("DEBUG: Background sound initialized");

                    bounceSound = new Audio('sound/ball_bounce.mp3');
                    bounceSound.volume = 0.6;
                    console.log("DEBUG: Bounce sound initialized");

                    hoopHitSound = new Audio('sound/hoop_hit.mp3');
                    hoopHitSound.volume = 0.5;
                    console.log("DEBUG: Hoop hit sound initialized");

                    wheelsSound = new Audio('sound/wheels.mp3');
                    wheelsSound.volume = 0.2; // Reducido para no dominar
                    console.log("DEBUG: Wheels sound initialized");

                    scoreSound = new Audio('sound/score.mp3');
                    scoreSound.volume = 0.7;
                    console.log("DEBUG: Score sound initialized");

                    scoreAddSound = new Audio('sound/score_add.mp3');
                    scoreAddSound.volume = 0.7;
                    console.log("DEBUG: Score add sound initialized");

                    winSound = new Audio('sound/win.mp3');
                    winSound.volume = 0.8;
                    console.log("DEBUG: Win sound initialized");

                    loseSound = new Audio('sound/lose.mp3');
                    loseSound.volume = 0.8;
                    console.log("DEBUG: Lose sound initialized");
                } catch (err) {
                    console.error("DEBUG: Error initializing sounds:", err);
                }
            };

            const playBackground = () => {
                console.log("DEBUG: Attempting to play background sound");
                if (backgroundSound && !isSoundPlaying) {
                    backgroundSound.play().then(() => {
                        isSoundPlaying = true;
                        console.log("DEBUG: Background sound started");
                    }).catch(err => console.error("DEBUG: Error playing background sound:", err));
                }
            };

            const stopBackground = () => {
                console.log("DEBUG: Stopping background sound");
                if (backgroundSound) {
                    backgroundSound.pause();
                    backgroundSound.currentTime = 0;
                    isSoundPlaying = false;
                    console.log("DEBUG: Background sound stopped");
                }
            };

            const playSound = (soundType) => {
                console.log(`DEBUG: Attempting to play ${soundType} sound`);
                const soundMap = {
                    bounce: bounceSound,
                    hoopHit: hoopHitSound,
                    wheels: wheelsSound,
                    score: scoreSound,
                    scoreAdd: scoreAddSound,
                    win: winSound,
                    lose: loseSound
                };
                const sound = soundMap[soundType];
                if (sound) {
                    sound.currentTime = 0;
                    sound.play().then(() => {
                        console.log(`DEBUG: ${soundType} sound played successfully`);
                    }).catch(err => console.error(`DEBUG: Error playing ${soundType} sound:`, err));
                } else {
                    console.error(`DEBUG: Sound ${soundType} not found`);
                }
            };

            const cleanup = () => {
                console.log("DEBUG: Cleaning up SoundManager");
                stopBackground();
                [bounceSound, hoopHitSound, wheelsSound, scoreSound, scoreAddSound, winSound, loseSound].forEach(sound => {
                    if (sound) {
                        sound.pause();
                        sound.currentTime = 0;
                    }
                });
            };

            return { init, playBackground, stopBackground, playSound, cleanup };
        })();

        const gameReducer = (state, action) => {
            console.log("DEBUG: Reducer action:", action.type, action.payload);
            switch (action.type) {
                case 'UPDATE_GAME_STATE':
                    return {
                        ...state,
                        scores: action.payload.scores || state.scores,
                        round: action.payload.round || state.round,
                        turn: action.payload.turn || state.turn,
                        attempts: action.payload.attempts || state.attempts,
                        players: action.payload.players || state.players
                    };
                case 'SET_ROOM':
                    return { ...state, room: action.payload };
                case 'SET_GAME_STARTED':
                    return { ...state, gameStarted: action.payload };
                case 'SET_WINNER':
                    return { ...state, winner: action.payload };
                default:
                    return state;
            }
        };

        const App = () => {
            console.log("DEBUG: App component rendered");
            const [screen, setScreen] = useState('home');
            const [name, setName] = useState('Jugador1');
            const [gameState, dispatch] = useReducer(gameReducer, {
                room: null,
                gameStarted: false,
                winner: null,
                players: [],
                scores: [0, 0],
                round: 1,
                turn: 0,
                attempts: [0, 0]
            });
            const wsRef = useRef(null);
            const lastBallStateRef = useRef(null);
            const playerIndexRef = useRef(null);
            const rankingsRef = useRef([]);
            const roomStatusRef = useRef({ room1: { players: 0 }, room2: { players: 0 } });

            useEffect(() => {
                console.log("DEBUG: Setting up WebSocket and SoundManager");
                window.playerName = name;
                SoundManager.init();

                const wsUrl = 'https://basquetonline.onrender.com';
                wsRef.current = new WebSocket(wsUrl);

                wsRef.current.onopen = () => {
                    console.log("DEBUG: Connected to WebSocket server");
                    wsRef.current.send(JSON.stringify({ type: 'getRooms' }));
                    wsRef.current.send(JSON.stringify({ type: 'getRankings' }));
                };

                wsRef.current.onmessage = (event) => {
                    console.log("DEBUG: WebSocket message received");
                    try {
                        const data = JSON.parse(event.data);
                        console.log("DEBUG: WebSocket data:", data);

                        if (data.type === 'rooms') {
                            console.log("DEBUG: Updating room status:", data.rooms);
                            roomStatusRef.current = data.rooms;
                        }

                        if (data.type === 'joined') {
                            console.log("DEBUG: Joined room:", data.room);
                            dispatch({ type: 'SET_ROOM', payload: data.room });
                            dispatch({ type: 'UPDATE_GAME_STATE', payload: { players: data.players } });
                            playerIndexRef.current = data.playerIndex;
                            setScreen('gameplay');
                        }

                        if (data.type === 'start') {
                            console.log("DEBUG: Game started:", data);
                            dispatch({
                                type: 'UPDATE_GAME_STATE',
                                payload: {
                                    players: data.players,
                                    scores: data.scores,
                                    round: data.round,
                                    turn: data.turn,
                                    attempts: data.attempts
                                }
                            });
                            dispatch({ type: 'SET_GAME_STARTED', payload: true });
                        }

                        if (data.type === 'update') {
                            console.log("DEBUG: Game state update:", data);
                            dispatch({
                                type: 'UPDATE_GAME_STATE',
                                payload: {
                                    scores: data.scores,
                                    round: data.round,
                                    turn: data.turn,
                                    attempts: data.attempts,
                                    players: data.players
                                }
                            });

                            if (lastBallStateRef.current && data.ball) {
                                if (
                                    lastBallStateRef.current.thrown &&
                                    !data.ball.thrown &&
                                    data.ball.vy === 0 &&
                                    data.ball.vx === 0 &&
                                    data.ball.y === 370
                                ) {
                                    console.log("DEBUG: Triggering bounce sound");
                                    SoundManager.playSound('bounce');
                                }
                                if (
                                    lastBallStateRef.current.y > 113 &&
                                    data.ball.y <= 113 &&
                                    Math.abs(data.ball.x - data.hoopX) < 15
                                ) {
                                    console.log("DEBUG: Triggering hoop hit sound");
                                    SoundManager.playSound('hoopHit');
                                }
                                if (
                                    Math.abs(lastBallStateRef.current.x - data.hoopX) > 75 &&
                                    Math.abs(data.ball.x - data.hoopX) <= 75 &&
                                    data.round >= 2 // Solo en rondas 2 y 3
                                ) {
                                    console.log("DEBUG: Triggering wheels sound");
                                    SoundManager.playSound('wheels');
                                }
                                if (
                                    lastBallStateRef.current.thrown &&
                                    !data.ball.thrown &&
                                    data.scores[data.turn] > (lastBallStateRef.current.scores?.[data.turn] || 0)
                                ) {
                                    console.log("DEBUG: Triggering score sounds");
                                    SoundManager.playSound('score');
                                    SoundManager.playSound('scoreAdd');
                                }
                            }
                            lastBallStateRef.current = { ...data.ball, scores: [...data.scores] };
                        }

                        if (data.type === 'newRound') {
                            console.log("DEBUG: New round:", data);
                            dispatch({
                                type: 'UPDATE_GAME_STATE',
                                payload: { round: data.round, turn: data.turn, attempts: data.attempts }
                            });
                        }

                        if (data.type === 'end') {
                            console.log("DEBUG: Game ended:", data);
                            dispatch({ type: 'SET_WINNER', payload: data.winner });
                            dispatch({ type: 'SET_GAME_STARTED', payload: false });
                            setScreen('result');
                            if (data.winner === name) {
                                console.log("DEBUG: Triggering win sound");
                                SoundManager.playSound('win');
                            } else if (data.winner !== 'tie') {
                                console.log("DEBUG: Triggering lose sound");
                                SoundManager.playSound('lose');
                            }
                        }

                        if (data.type === 'rankings') {
                            console.log("DEBUG: Received rankings:", data.rankings);
                            rankingsRef.current = data.rankings;
                        }

                        if (data.type === 'full') {
                            console.log("DEBUG: Room full");
                            alert("La sala está llena. Por favor, elige otra sala.");
                            setScreen('rooms');
                        }
                    } catch (err) {
                        console.error("DEBUG: Error processing WebSocket message:", err);
                    }
                };

                wsRef.current.onclose = () => {
                    console.log("DEBUG: Disconnected from WebSocket server");
                    SoundManager.stopBackground();
                };

                wsRef.current.onerror = (err) => {
                    console.error("DEBUG: WebSocket error:", err);
                };

                return () => {
                    console.log("DEBUG: Cleaning up WebSocket and SoundManager");
                    if (wsRef.current) {
                        wsRef.current.close();
                    }
                    SoundManager.cleanup();
                };
            }, [name]);

            const Home = ({ setScreen, name, setName }) => {
                console.log("DEBUG: Home component rendered");
                const startSound = () => {
                    SoundManager.playBackground();
                };

                useEffect(() => {
                    console.log("DEBUG: Setting up interaction listener for sound");
                    const handleInteraction = () => {
                        startSound();
                        document.removeEventListener('click', handleInteraction);
                    };
                    document.addEventListener('click', handleInteraction);
                    return () => document.removeEventListener('click', handleInteraction);
                }, []);

                return (
                    <div className="container">
                        <h1>Juego de Baloncesto</h1>
                        <input
                            type="text"
                            placeholder="Ingresa tu nombre"
                            value={name}
                            onChange={(e) => setName(e.target.value)}
                        />
                        <br />
                        <button onClick={() => setScreen('rooms')}>Entrar a Partida</button>
                        <button onClick={() => setScreen('rankings')}>Rankings</button>
                        <button onClick={() => setScreen('credits')}>Créditos v1.0</button>
                    </div>
                );
            };

            const Rooms = ({ setScreen }) => {
                console.log("DEBUG: Rooms component rendered");
                const joinRoom = (roomName) => {
                    console.log("DEBUG: Joining room:", roomName);
                    if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
                        wsRef.current.send(JSON.stringify({ type: 'join', room: roomName, name }));
                    } else {
                        console.error("DEBUG: WebSocket not open");
                        alert("No se pudo conectar al servidor. Intenta de nuevo.");
                    }
                };

                return (
                    <div className="container">
                        <h1>Salas</h1>
                        <div className="room">
                            <span>Sala 1 ({roomStatusRef.current.room1.players}/2)</span>
                            <button
                                onClick={() => joinRoom('room1')}
                                disabled={roomStatusRef.current.room1.players >= 2}
                            >
                                Entrar
                            </button>
                        </div>
                        <div className="room">
                            <span>Sala 2 ({roomStatusRef.current.room2.players}/2)</span>
                            <button
                                onClick={() => joinRoom('room2')}
                                disabled={roomStatusRef.current.room2.players >= 2}
                            >
                                Entrar
                            </button>
                        </div>
                        <button onClick={() => setScreen('home')}>Volver</button>
                    </div>
                );
            };

            const Gameplay = memo(() => {
                console.log("DEBUG: Gameplay component rendered");
                const sketchRef = useRef(null);
                const p5Instance = useRef(null);
                const timerRef = useRef(8);
                const ballRef = useRef({ x: 300, y: 370, r: 30, vx: 0, vy: 0, thrown: false, rotation: 0 });
                const hoopXRef = useRef(300);
                const isMounted = useRef(false);

                const setupSketch = (p) => {
                    let ballImg, hoopBaseImg, hoopRingImg;
                    let dragging = false;
                    let dragStartX, dragStartY;
                    let ballScale = 1;

                    p.preload = () => {
                        console.log("DEBUG: Preloading resources");
                        try {
                            ballImg = p.loadImage('img/balon/ball.png', () => {
                                console.log("DEBUG: Ball image loaded successfully");
                            }, (err) => {
                                console.error("DEBUG: Error loading ball image:", err);
                            });
                            hoopBaseImg = p.loadImage('img/arco/hoop_base.png', () => {
                                console.log("DEBUG: Hoop base image loaded successfully");
                            }, (err) => {
                                console.error("DEBUG: Error loading hoop base image:", err);
                            });
                            hoopRingImg = p.loadImage('img/arco/hoop_ring.png', () => {
                                console.log("DEBUG: Hoop ring image loaded successfully");
                            }, (err) => {
                                console.error("DEBUG: Error loading hoop ring image:", err);
                            });
                        } catch (error) {
                            console.error("DEBUG: Error in preload:", error);
                        }
                    };

                    p.setup = () => {
                        console.log("DEBUG: Setting up p5 canvas");
                        p.createCanvas(600, 400);
                        p.frameRate(30);
                    };

                    p.draw = () => {
                        p.clear();

                        ballRef.current.x = ballRef.current.x || 300;
                        ballRef.current.y = ballRef.current.y || 370;
                        hoopXRef.current = hoopXRef.current || 300;

                        const hoopBaseWidth = 240;
                        const hoopBaseHeight = hoopBaseWidth * (3464 / 2598);
                        const hoopRingWidth = 75;
                        const hoopRingHeight = hoopRingWidth * (499 / 788);

                        if (ballImg && hoopBaseImg && hoopRingImg) {
                            p.image(hoopBaseImg, hoopXRef.current - hoopBaseWidth / 1.98, 40, hoopBaseWidth, hoopBaseHeight);
                            ballScale = p.map(ballRef.current.y, 370, 113, 1, 0.8);
                            ballScale = p.constrain(ballScale, 0.8, 1);
                            const drawRotatedBall = () => {
                                p.push();
                                p.translate(ballRef.current.x, ballRef.current.y);
                                p.rotate(ballRef.current.rotation || 0);
                                p.image(ballImg, -ballRef.current.r * ballScale, -ballRef.current.r * ballScale, ballRef.current.r * 2 * ballScale, ballRef.current.r * 2 * ballScale);
                                p.pop();
                            };

                            if (ballRef.current.vy > 0) {
                                drawRotatedBall();
                                p.image(hoopRingImg, hoopXRef.current - hoopRingWidth / 2.2, 113, hoopRingWidth, hoopRingHeight);
                            } else {
                                p.image(hoopRingImg, hoopXRef.current - hoopRingWidth / 2.2, 113, hoopRingWidth, hoopRingHeight);
                                drawRotatedBall();
                            }
                        } else {
                            console.warn("DEBUG: Some images not loaded yet");
                        }

                        if (gameState.gameStarted) {
                            const timerWidth = p.map(timerRef.current, 0, 8, 0, 100);
                            p.noStroke();
                            p.fill(255, 0, 0);
                            p.rect(300, 10, 100, 10);
                            p.fill(0, 255, 0);
                            p.rect(300, 10, timerWidth, 10);
                        }
                    };

                    p.mousePressed = () => {
                        console.log("DEBUG: Mouse pressed");
                        if (gameState.gameStarted && gameState.turn === playerIndexRef.current && !ballRef.current.thrown && gameState.attempts[playerIndexRef.current] < 5) {
                            if (
                                p.mouseX >= ballRef.current.x - ballRef.current.r &&
                                p.mouseX <= ballRef.current.x + ballRef.current.r &&
                                p.mouseY >= ballRef.current.y - ballRef.current.r &&
                                p.mouseY <= ballRef.current.y + ballRef.current.r
                            ) {
                                dragging = true;
                                dragStartX = p.mouseX;
                                dragStartY = p.mouseY;
                                console.log("DEBUG: Started dragging ball");
                            }
                        }
                    };

                    p.mouseReleased = () => {
                        if (dragging) {
                            console.log("DEBUG: Mouse released");
                            const dx = p.mouseX - dragStartX;
                            const dy = p.mouseY - dragStartY;
                            const power = Math.min(Math.max(Math.sqrt(dx * dx + dy * dy) / 10, 0.2), 15);
                            const angle = Math.atan2(dy, dx);
                            const vx = power * Math.cos(angle);
                            const vy = power * Math.sin(angle);

                            if (wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
                                console.log("DEBUG: Sending shot message:", { vx, vy });
                                wsRef.current.send(JSON.stringify({
                                    type: 'shot',
                                    room: gameState.room,
                                    playerIndex: playerIndexRef.current,
                                    ballVX: vx,
                                    ballVY: vy
                                }));
                            } else {
                                console.error("DEBUG: WebSocket not open for shot");
                            }

                            dragging = false;
                        }
                    };

                    p.mouseDragged = () => {
                        if (dragging) {
                            console.log("DEBUG: Dragging in progress");
                        }
                    };
                };

                useEffect(() => {
                    console.log("DEBUG: Gameplay useEffect for p5 setup, gameStarted:", gameState.gameStarted);
                    if (!isMounted.current && sketchRef.current && gameState.gameStarted) {
                        console.log("DEBUG: Creating p5 instance");
                        p5Instance.current = new p5(setupSketch, sketchRef.current);
                        isMounted.current = true;
                    }

                    return () => {
                        console.log("DEBUG: Cleaning up p5 instance");
                        if (p5Instance.current) {
                            p5Instance.current.remove();
                            p5Instance.current = null;
                            isMounted.current = false;
                        }
                    };
                }, [gameState.gameStarted]);

                useEffect(() => {
                    console.log("DEBUG: Setting up WebSocket message handler");
                    const handleMessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            console.log("DEBUG: Gameplay WebSocket message:", data);
                            if (data.type === 'update') {
                                ballRef.current = { ...ballRef.current, ...data.ball };
                                hoopXRef.current = data.hoopX;
                                timerRef.current = data.timer;
                            }
                        } catch (err) {
                            console.error("DEBUG: Error processing gameplay WebSocket message:", err);
                        }
                    };

                    if (wsRef.current) {
                        wsRef.current.addEventListener('message', handleMessage);
                    }

                    return () => {
                        console.log("DEBUG: Removing WebSocket message handler");
                        if (wsRef.current) {
                            wsRef.current.removeEventListener('message', handleMessage);
                        }
                    };
                }, []);

                return (
                    <div className="gameplay">
                        <div className="game-container">
                            <div ref={sketchRef}></div>
                            <div className="score">{gameState.scores[0]} | {gameState.scores[1]}</div>
                            <div className="turn">Turno: {gameState.players[gameState.turn] || 'Esperando...'}</div>
                            <div className="round">Ronda {gameState.round}/3</div>
                            <div className="attempts">
                                Intentos: <br />
                                {gameState.players[0] ? `${gameState.players[0]}: ${gameState.attempts[0]}/5` : 'Esperando...'} <br />
                                {gameState.players[1] ? `${gameState.players[1]}: ${gameState.attempts[1]}/5` : 'Esperando...'}
                            </div>
                            {gameState.players[0] && (
                                <>
                                    <img src="img/iconosplayer/player1.png" alt="Player 1" className="player-icon player1" onError={(e) => console.error("DEBUG: Error loading player1 icon")} />
                                    <div className="player-name player1-name">{gameState.players[0]}</div>
                                </>
                            )}
                            {gameState.players[1] && (
                                <>
                                    <img src="img/iconosplayer/player2.png" alt="Player 2" className="player-icon player2" onError={(e) => console.error("DEBUG: Error loading player2 icon")} />
                                    <div className="player-name player2-name">{gameState.players[1]}</div>
                                </>
                            )}
                            <div className="turn-indicator" style={{ display: 'none' }}>Modo Edición - Sin Turnos</div>
                            {gameState.gameStarted && <div className="timer"><div className="timer-bar" style={{ width: `${timerRef.current * 12.5}%` }}></div></div>}
                            {!gameState.gameStarted && <div className="waiting-message">Esperando al segundo jugador...</div>}
                        </div>
                    </div>
                );
            });

            const Rankings = ({ setScreen }) => {
                console.log("DEBUG: Rankings component rendered");
                return (
                    <div className="container">
                        <h1>Rankings</h1>
                        {rankingsRef.current.map((entry, index) => (
                            <div key={index}>
                                {index + 1}. {entry.name}: {entry.score}
                            </div>
                        ))}
                        <button onClick={() => setScreen('home')}>Volver</button>
                    </div>
                );
            };

            const Credits = ({ setScreen }) => {
                console.log("DEBUG: Credits component rendered");
                return (
                    <div className="container">
                        <h1>Créditos</h1>
                        <p>Juego creado por [Tu Nombre]</p>
                        <p>Arte y diseño: [Tu Nombre]</p>
                        <p>Sonidos: SoundJay.com</p>
                        <p>Gracias a xAI por la asistencia</p>
                        <button onClick={() => setScreen('home')}>Volver</button>
                    </div>
                );
            };

            const Result = ({ setScreen }) => {
                console.log("DEBUG: Result component rendered");
                return (
                    <div className="container">
                        <h1>{gameState.winner === 'tie' ? '¡Empate!' : gameState.winner === name ? '¡Ganaste!' : 'Perdiste'}</h1>
                        <button onClick={() => setScreen('rooms')}>Volver</button>
                    </div>
                );
            };

            return (
                <div>
                    {screen === 'home' && <Home setScreen={setScreen} name={name} setName={setName} />}
                    {screen === 'rooms' && <Rooms setScreen={setScreen} />}
                    {screen === 'gameplay' && <Gameplay />}
                    {screen === 'rankings' && <Rankings setScreen={setScreen} />}
                    {screen === 'credits' && <Credits setScreen={setScreen} />}
                    {screen === 'result' && <Result setScreen={setScreen} />}
                </div>
            );
        };

        console.log("DEBUG: Rendering App");
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
